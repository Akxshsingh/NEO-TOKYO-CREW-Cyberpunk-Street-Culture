<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STREET · CRAFFITICREW · Urban Culture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Bangers&family=Rubik+Glitch&family=Rock+Salt&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/street.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body class="street-body">
  <div class="street-container">
    <!-- Header -->
    <header class="fusion-header graffiti-header">
      <div class="logo-group">
        <a href="../index.html" style="text-decoration: none;">
          <div class="logo-cyber">TETSUO<span>//</span><small>鉄雄</small></div>
        </a>
        <div class="logo-divider">×</div>
        <a href="street.html" style="text-decoration: none;">
          <div class="logo-street">CRAFFITI<span>CREW</span></div>
        </a>
      </div>
      <nav class="main-nav">
        <a href="../index.html" class="nav-link"><i class="fas fa-skull"></i> HOME</a>
        <a href="tetsuo.html" class="nav-link"><i class="fas fa-bolt"></i> TETSUO</a>
        <a href="street.html" class="nav-link active"><i class="fas fa-city"></i> STREET</a>
        <a href="gobe.html" class="nav-link"><i class="fas fa-spray-can"></i> GOBE</a>
        <a href="lorem.html" class="nav-link"><i class="fas fa-font"></i> LOREM</a>
        <a href="join.html" class="nav-link"><i class="fas fa-users"></i> JOIN</a>
        <a href="download.html" class="nav-link"><i class="fas fa-download"></i> DOWNLOAD</a>
      </nav>
    </header>

    <!-- Street Hero -->
    <div class="street-hero">
      <div class="graffiti-art-block">
        <svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
          <rect width="500" height="350" fill="#0f0f0f"/>
          <circle cx="120" cy="130" r="80" fill="#ff3b3b" opacity="0.25"/>
          <circle cx="380" cy="220" r="90" fill="#ffcc00" opacity="0.2"/>
          <text x="30" y="100" font-family="'Rubik Glitch'" font-size="52" fill="#ffd966" stroke="#c00040" stroke-width="4">CRAFFITI</text>
          <text x="50" y="160" font-family="'Bangers'" font-size="38" fill="white" stroke="#000" stroke-width="3">STREET CULTURE</text>
          <text x="230" y="120" font-family="'Rock Salt'" font-size="30" fill="#a0ffb0" stroke="#aa00ff" stroke-width="3">GOBE</text>
          <text x="270" y="260" font-family="'Bangers'" font-size="28" fill="#ffcc00">LOREMIPSUM</text>
          <path d="M20 310 L480 290" stroke="#ffcc00" stroke-width="6" stroke-dasharray="15 8"/>
        </svg>
        <p style="margin-top: 15px; font-family: 'Bangers'; letter-spacing: 2px;">
          <i class="fas fa-map-pin" style="color:#ff3b3b"></i> FROM THE STREETS · FOR THE STREETS
        </p>
      </div>
      <div style="background: #1a1a1a; padding: 2rem; border-left: 12px solid #ff3b3b;">
        <h2 style="font-family: 'Bangers'; font-size: 3rem; color: #ffcc00; text-shadow: 3px 3px 0 #b3002d;">#CRAFFITICREW</h2>
        <p style="font-size: 1.4rem; margin: 20px 0;">Raw energy. Unapologetic style. <br>We are the voice of the concrete.</p>
        <div class="tag-cloud">
          <span class="tag-item">GOBE</span>
          <span class="tag-item">LOREMIPSUM</span>
          <span class="tag-item">STREETART</span>
          <span class="tag-item">WILDSTYLE</span>
        </div>
        <div style="display: flex; gap: 15px; margin-top: 30px;">
          <i class="fas fa-spray-can fa-2x" style="color: #ffcc00;"></i>
          <i class="fas fa-skull fa-2x" style="color: #b0b0b0;"></i>
          <i class="fas fa-crown fa-2x" style="color: gold;"></i>
        </div>
      </div>
    </div>

    <!-- Crew Grid -->
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0;">
      <div style="background: #181818; padding: 1.5rem; border: 2px solid #ffcc00; text-align: center;">
        <i class="fas fa-spray-can" style="font-size: 3rem; color: #ffcc00;"></i>
        <h3>SPRAY</h3>
        <p>can control</p>
      </div>
      <div style="background: #181818; padding: 1.5rem; border: 2px solid #ffcc00; text-align: center;">
        <i class="fas fa-paint-brush" style="font-size: 3rem; color: #ffcc00;"></i>
        <h3>MURAL</h3>
        <p>large scale</p>
      </div>
      <div style="background: #181818; padding: 1.5rem; border: 2px solid #ffcc00; text-align: center;">
        <i class="fas fa-subway" style="font-size: 3rem; color: #ffcc00;"></i>
        <h3>TRANSIT</h3>
        <p>moving canvas</p>
      </div>
    </div>
  </div>
  <script src="../js/main.js"></script>
</body>
</html>
