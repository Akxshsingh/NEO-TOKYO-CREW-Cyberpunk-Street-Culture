<body class="street-body">
  <div class="street-container">
    <!-- Header -->
    <header class="fusion-header">

        <a href="../index.html" style="text-decoration: none;">
          <div class="logo-cyber">TETSUO<span>//</span><small>鉄雄</small></div>
        </a>
        <div class="logo-divider">×</div>
        <a href="street.html" style="text-decoration: none;">
          <div class="logo-street">CRAFFITI<span>CREW</span></div>
        </a>
      </div>
      <nav class="main-nav">
        <a href="../index.html" class="nav-link"><i class="fas fa-skull"></i> HOME</a>
        <a href="tetsuo.html" class="nav-link"><i class="fas fa-bolt"></i> TETSUO</a>

      </nav>
    </header>

    <!-- JOIN Content -->
    <div class="join-hero">
      <h2 style="font-family:'Rubik Glitch'; font-size:4.5rem; color:#ffd966; text-shadow:5px 5px 0 #b3002d;">JOIN OUR CREW</h2>
      <p style="font-size:1.6rem; margin: 10px 0 20px;">Become part of CRAFFITICREW. Spray, create, rebel.</p>
      
      <svg width="100%" height="140" viewBox="0 0 400 140" style="margin:15px 0;">
        <rect width="400" height="140" fill="#0f0f0f" rx="10"/>
        <circle cx="70" cy="70" r="30" fill="#ff3b3b" opacity="0.5"/>
        <circle cx="200" cy="60" r="40" fill="#ffcc00" opacity="0.4"/>
        <circle cx="330" cy="80" r="35" fill="#00c8ff" opacity="0.4"/>
        <text x="30" y="95" font-family="'Bangers'" font-size="26" fill="white">YOU</text>
        <text x="150" y="110" font-family="'Rubik Glitch'" font-size="32" fill="#a0ffb0">+ CREW</text>
        <text x="280" y="70" font-family="'Rock Salt'" font-size="22" fill="#ffd966">JOIN</text>
      </svg>
      
      <form class="join-form-street" onsubmit="return false;">
        <input type="text" placeholder="YOUR STREET NAME" class="join-input-street" required>
        <input type="email" placeholder="EMAIL" class="join-input-street" required>
        <button type="submit" class="btn-join-street"><i class="fas fa-spray-can"></i> INITIATE</button>
      </form>
      
      <p style="margin-top:20px;"><i class="fas fa-check-circle" style="color:#0f0;"></i> #LOREMIPSUM #GOBE #CRAFFITICREW #TETSUO</p>
